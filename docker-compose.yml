services:
  app_database:
    image: mysql:8.0
    env_file:
      - .env
    # environment:
    #   MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
    #   MYSQL_USER: ${USER}
    #   MYSQL_PASSWORD: ${PASSWORD}
    #   MYSQL_DATABASE: ${DATABASE}
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_USER: lab_user
      MYSQL_PASSWORD: minha_senha
      MYSQL_DATABASE: lab

    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    ports:
      - 8000:8000
    depends_on:
      - app_database

volumes:
  mysql_data:
